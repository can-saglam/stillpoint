<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stillpoint</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stillpoint" />
    <meta name="theme-color" content="#7ab8ac" />
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid; place-items: center;
        font-family: -apple-system, system-ui, sans-serif;
        color: #2c4a45;
        background:
          radial-gradient(at 20% 15%, #b9e0d6 0, transparent 55%),
          radial-gradient(at 82% 80%, #e6e2f3 0, transparent 55%),
          #eef5f2;
      }
      .wrap { text-align: center; animation: fade .6s ease both; }
      .leaf { font-size: 44px; animation: breathe 6s ease-in-out infinite; }
      h1 { font-weight: 500; font-size: 22px; margin: 14px 0 6px; }
      p { color: #5f7d77; font-size: 14px; margin: 0; }
      a { color: #3f8e83; }
      @keyframes breathe { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }
      @keyframes fade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="leaf">🌿</div>
      <h1>Opening Stillpoint…</h1>
      <p id="status">Connecting to your practice.</p>
    </div>
    <script>
      (async () => {
        try {
          const r = await fetch('url.json?t=' + Date.now(), { cache: 'no-store' });
          const { url } = await r.json();
          if (url) { location.replace(url); return; }
          throw new Error('no url');
        } catch (e) {
          document.getElementById('status').innerHTML =
            "Your laptop isn't reachable right now.<br>Make sure Stillpoint is running, then refresh.";
        }
      })();
    </script>
  </body>
</html>
